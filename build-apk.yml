name: Build APK

on:
  push:
    branches: [ main ]
    paths:
      # Any app code/resource change
      - 'app/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/workflows/build-apk.yml'
      # Explicitly catches you swapping in a newly trained model
      - 'app/src/main/assets/model.tflite'
      - 'app/src/main/assets/labels.txt'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      # Only decodes a keystore if the KEYSTORE_BASE64 secret has been added
      # to the repo. If it's missing, the release build falls back to debug
      # signing (see app/build.gradle.kts) so the workflow still succeeds.
      - name: Decode signing keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
          echo "KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease --stacktrace

      - name: Rename APK with version + build info
        id: rename
        run: |
          VERSION_NAME=$(grep -m1 'versionName' app/build.gradle.kts | sed -E 's/.*"(.*)".*/\1/')
          SHORT_SHA=$(git rev-parse --short HEAD)
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then SIGNED_TAG="signed"; else SIGNED_TAG="debugsigned"; fi
          NEW_NAME="CCTVDetector-v${VERSION_NAME}-build${{ github.run_number }}-${SHORT_SHA}-${SIGNED_TAG}.apk"
          SRC=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          mv "$SRC" "app/build/outputs/apk/release/$NEW_NAME"
          echo "apk_name=$NEW_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rename.outputs.apk_name }}
          path: app/build/outputs/apk/release/${{ steps.rename.outputs.apk_name }}
